# Minimal sanitized example so `forge manifest validate ./examples` has
# a concrete manifest to check in public checkouts.
apiVersion: forge/v1
kind: LaunchAgent
metadata:
  name: example-smoke-check
spec:
  name: example-smoke-check
  label: dev.example.example-smoke-check
  command: /usr/bin/true
  schedule:
    type: interval
    interval_seconds: 86400
  run_at_load: true
