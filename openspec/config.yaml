schema: spec-driven
context: |
  Repository: Forge
  Language: Go 1.26
  Product role: operator-facing umbrella CLI for imperative automation.

  Boundary rules:
  - Forge owns the top-level CLI experience and imperative operator workflows.
  - Anvil owns reconciliation runtime behavior unless code is intentionally migrated.
  - Alloy owns shared schema types, kind constants, and schema-oriented validation.

  Repository rules:
  - Keep public examples and documentation sanitized.
  - Prefer explicit command handling over framework-heavy abstractions.
  - Favor standard library solutions unless a dependency is clearly justified.
rules:
  proposal:
    - Keep scope aligned with Forge as a public product shell.
    - Call out when a change should live in anvil or alloy instead of forge.
  specs:
    - Describe observable CLI behavior, user-facing inputs and outputs, and public-safety constraints.
    - Use SHALL language and concrete scenarios where behavior needs validation.
  design:
    - Keep implementation plans lightweight, direct, and easy to debug.
  tasks:
    - Break work into small, verifiable steps tied to repo-visible outcomes.
